  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"aa06550c-441b-4382-8c4c-531765651732\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"9e469f04-9509-429e-b4d0-e03842a0ecdd\" integrity=\"sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi\" crossorigin=\"anonymous\"><\u002Fscript>\n<style>\n:root {\n  --oc:#B7632A; --ocl:#FAEEDA; --ocd:#854F0B;\n  --sv:#4A5A3A; --svl:#EAF3DE; --svd:#27500A;\n  --gd:#9A7A3A; --gdb:#D4A855;\n  --ink:#1F1A14; --ink2:#3A3026; --mu:#6B5F50;\n  --br:#C9BEA9; --sf:#F5F0E8; --cd:#FAF6EC; --bd:#1a1510;\n  --rg:#3B6D11; --rr:#C0392B;\n  --se:'Cormorant Garamond',Georgia,serif;\n  --sa:'Inter',system-ui,sans-serif;\n  --mo:'JetBrains Mono',monospace;\n}\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}\nhtml,body{height:100%;overflow:hidden;background:var(--bd);}\nbody{font-family:var(--sa);font-size:13px;-webkit-font-smoothing:antialiased;color:var(--ink2);}\n.app{display:flex;height:100vh;overflow:hidden;}\n\n.sb{width:196px;background:var(--cd);border-right:0.5px solid var(--br);display:flex;flex-direction:column;flex-shrink:0;}\n.sb-brand{padding:18px 16px 14px;border-bottom:0.5px solid var(--br);}\n.sb-logo{font-family:var(--se);font-size:24px;font-weight:600;color:var(--ink);line-height:1;}\n.sb-sub{font-size:8px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--oc);margin-top:3px;}\n.nav-lbl{font-size:8.5px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--mu);padding:12px 16px 5px;}\n.ni{display:flex;align-items:center;gap:8px;padding:9px 16px;font-size:12.5px;color:var(--mu);cursor:pointer UpperCase()+key.slice(1));\n  if(drop){\n    drop.querySelectorAll('.fdrop-item').forEach(function(item){\n      item.classList.toggle('on', item.dataset.val===val);\n    });\n    drop.style.display='none';\n  }\n  updateFilterTags();\n  render();\n}\n\nfunction updateFilterTags() {\n  var el=dc().getElementById('activeFilterTags'); if(!el) return;\n  var tags=[];\n  if(FILTERS.channel!=='all') tags.push({l:'Channel: '+FILTERS.channel,k:'channel'});\n  if(FILTERS.year&&FILTERS.year!=='2026') tags.push({l:'Year: '+FILTERS.year,k:'year'});\n  if(FILTERS.market!=='all') tags.push({l:'Market: '+FILTERS.market.toUpperCase(),k:'market'});\n  if(FILTERS.comp!=='ly') tags.push({l:'vs '+FILTERS.comp.toUpperCase(),k:'comp'});\n  if(SEL_PROPS.length<PROPS.length) tags.push({l:SEL_PROPS.length+' props',k:'props'});\n  el.innerHTML=tags.map(function(t){\n    return '<span class=\"ftag\" data-key=\"'+t.k+'\" style=\"font-size:9px;padding:2px 8px;border-radius:3px;background:var(--ocl);border:0.5px solid var(--oc);color:var(--ocd);font-weight:500;cursor:pointer;\">'+t.l+' x<\u002Fspan>';\n  }).join('');\n}\n\nfunction clearTag(key) {\n  if(key==='channel') setFilter('channel','all',null);\n  else if(key==='market') setFilter('market','all',null);\n  else if(key==='comp') setFilter('comp','ly',null);\n  else if(key==='props') selAllProps();\n  else if(key==='year') setYear('2026',null);\n}\n\n// Close dropdowns when clicking outside\ndocument.addEventListener('click',function(e){\n  // KPI drill-down\n  var kpiEl=e.target.closest('[data-drill]');\n  if(kpiEl){ openDrill(kpiEl.getAttribute('data-drill')); return; }\n  // Filter tag clear\n  var ftag=e.target.closest('.ftag');\n  if(ftag){ clearTag(ftag.getAttribute('data-key')); return; }\n  if(!e.target.closest('.fpill')&&!e.target.closest('.fdrop')){\n    dc().querySelectorAll('.fdrop').forEach(function(d){d.style.display='none';});\n  }\n  if(!e.target.closest('.prop-trigger')&&!e.target.closest('#propDropPanel')){\n    var panel=dc().getElementById('propDropPanel');\n    if(panel) panel.style.display='none';\n    var pt=dc().getElementById('propTrigger'); if(pt) pt.classList.remove('active');\n  }\n});\n\nvar YEAR_MULT = {\n  '2022':0.68,'2023':0.79,'2024':0.88,'2025':0.94,'2026':1.00,'2027':1.08,'2028':1.15\n};\nfunction setYear(yr, e) {\n  if(e) e.stopPropagation();\n  FILTERS.year = yr;\n  var el=dc().getElementById('fYearLbl'); if(el) el.textContent=yr;\n  var pill=dc().getElementById('fYear');\n  if(pill) pill.classList.toggle('active', yr!=='2026');\n  var drop=dc().getElementById('dYear');\n  if(drop){\n    drop.querySelectorAll('.fdrop-item').forEach(function(item){\n      item.classList.toggle('on', item.dataset.val===yr);\n    });\n    drop.style.display='none';\n  }\n  // Update timestamp label — but NOT the data-as-at (that's fixed to last extract)\n  updateFilterTags();\n  clearAI();\n  render();\n}\n\nfunction render() {\n  dch();\n  var el=dc().getElementById('vCnt');\n  var titles={sales:'Sales',marketing:'Marketing',ops:'Operations',gex:'Guest Experience',finance:'Finance',mis:'MIS'};\n  var subTitles={pace:'Pace',occ:'Occupancy',tp:'Trade Partners',pl:'Pipeline',cn:'Consultants'};\n  var vt=titles[ST.view]||ST.view;\n  var st2=ST.view==='sales'&&subTitles[ST.sub]?subTitles[ST.sub]:'';\n  var titleEl=dc().getElementById('vTitle');\n  if(st2){\n    titleEl.innerHTML=vt+' <span style=\"color:var(--br);margin:0 4px;\">&#8250;<\u002Fspan><span style=\"color:var(--oc);font-weight:600;\">'+st2+'<\u002Fspan>';\n  } else {\n    titleEl.textContent=vt;\n  }\n  // period label removed from topbar (shown in toggle)\n  var h;\n  if(ST.view==='sales') h=renderSales();\n  else if(ST.view==='marketing') h=renderStub('Marketing','Campaign performance, channel mix, web traffic analytics and lead generation metrics. Connect your CRM to activate.');\n  else if(ST.view==='ops') h=renderStub('Operations','Property operations, staffing, maintenance and service KPIs across all 16 properties. Con n    ],\n    cols:['Property','NR ADR','vs LY','Rank']\n  }\n};\n\nfunction openDrill(key) {\n  var d=DRILL_DATA[key]; if(!d) return;\n  dc().getElementById('drillTitle').textContent=d.title;\n  dc().getElementById('drillSub').textContent=d.sub;\n  var h='<table class=\"mt\"><thead><tr>';\n  d.cols.forEach(function(c,i){ h+='<th style=\"'+(i===0?'text-align:left;':'')+'\">'+c+'<\u002Fth>'; });\n  h+='<\u002Ftr><\u002Fthead><tbody>';\n  d.rows.forEach(function(r,ri){\n    h+='<tr class=\"'+(ri<3?'b':'')+'\">';\n    r.forEach(function(cell,ci){\n      var isChg=String(cell).match(/^[+-]/);\n      var cls=isChg?(cell[0]==='-'?'vr':'vg'):'';\n      h+='<td style=\"'+(ci===0?'text-align:left;font-size:12px;':'')+'\" class=\"'+cls+'\">'+cell+'<\u002Ftd>';\n    });\n    h+='<\u002Ftr>';\n  });\n  h+='<\u002Ftbody><\u002Ftable>';\n  dc().getElementById('drillBody').innerHTML=h;\n  dc().getElementById('drillOverlay').classList.add('open');\n}\n\nfunction closeDrill(e) {\n  if(e && e.target!==dc().getElementById('drillOverlay')) return;\n  dc().getElementById('drillOverlay').classList.remove('open');\n}\n\nwindow.addEventListener('load',function(){\n  dc().getElementById('aiSd').onclick=function(){sendAI(null);};\n  dc().getElementById('aiIn').onkeydown=function(e){if(e.key==='Enter')sendAI(null);};\n  setTs();\n  buildUserMenu();\n  updateNavForRole();\n  render();\n});\nfunction updSug() {\n  var key=ST.view==='sales'?ST.sub:ST.view;\n  var sugs=ASUG[key]||ASUG.pace;\n  var el=dc().getElementById('aiSug'); if(!el) return;\n  var h='<div class=\"ai-sl\">Suggested<\u002Fdiv>';\n  for(var i=0;i<sugs.length;i++){\n    h+='<button class=\"ai-pl\" onclick=\"sendAI(this.getAttribute(\\'data-q\\'))\" data-q=\"'+sugs[i]+'\">'+sugs[i]+'<\u002Fbutton>';\n  }\n  el.innerHTML=h;\n}\n\nfunction sendAI(text) {\n  var val=text||dc().getElementById('aiIn').value.trim();\n  if(!val) return;\n  dc().getElementById('aiIn').value='';\n  var msgs=dc().getElementById('aiMsg');\n  // Clear previou
